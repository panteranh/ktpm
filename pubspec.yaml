name: mangaapp1
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # UI and Core Packages
  cupertino_icons: ^1.0.8
  intl: ^0.19.0 # Added for date formatting

  # Local Storage & Settings
  shared_preferences: ^2.2.3
  flutter_cache_manager: ^3.3.2
  connectivity_plus: ^6.0.3
  
  # Firebase Suite
  firebase_core: ^3.1.1
  firebase_auth: ^5.1.1
  google_sign_in: ^6.2.1
  cloud_firestore: ^5.0.2 # For saving comic data
  firebase_storage: ^12.1.0 # For uploading images

  # Image Picker
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  # Declare assets folder
  assets:
    - assets/
